name: GitHub Hosted Runners Matrix

on:
  workflow_dispatch:

jobs:
  runner-info:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Runner Information
        run: |
          echo "Operating System: ${{ runner.os }}"
          echo "Hostname: ${{ runner.hostname }}"
          echo "Current User: ${{ runner.user }}"
          whoami

      - name: Check Pre-installed Tools
        run: |
          echo "Docker Version:"
          docker --version

          echo "Python Version:"
          python3 --version

          echo "Node Version:"
          node --version

          echo "Git Version:"
          git --version
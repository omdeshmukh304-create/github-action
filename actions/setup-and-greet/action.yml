name: "Setup and Greet"
description: "Custom composite action"

inputs:
  name:
    description: "User name"
    required: true
  language:
    description: "Language"
    required: false
    default: "en"

outputs:
  greeted:
    description: "Greeting done"
    value: ${{ steps.set.outputs.greeted }}

runs:
  using: "composite"
  steps:
    - name: Print Greeting
      shell: bash
      run: |
        if [ "${{ inputs.language }}" = "en" ]; then
          echo "Hello, ${{ inputs.name }}!"
        elif [ "${{ inputs.language }}" = "hi" ]; then
          echo "Namaste, ${{ inputs.name }}!"
        else
          echo "Hello, ${{ inputs.name }}!"
        fi

    - name: Print Date and OS
      shell: bash
      run: |
        echo "Date: $(date)"
        echo "Runner OS: $RUNNER_OS"

    - name: Set Output
      id: set
      shell: bash
      run: echo "greeted=true" >> $GITHUB_OUTPUT
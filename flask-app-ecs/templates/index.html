<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Docker CI/CD UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .container {
      width: 90%;
      max-width: 1100px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      padding: 5px 12px;
      background: #22c55e;
      border-radius: 20px;
      font-size: 12px;
      margin-bottom: 30px;
    }

    .steps {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 200px;
      padding: 30px 20px;
      border-radius: 15px;
      color: white;
      font-weight: 500;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
    }

    .blue { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
    .green { background: linear-gradient(135deg, #22c55e, #4ade80); }
    .orange { background: linear-gradient(135deg, #f97316, #fb923c); }
    .purple { background: linear-gradient(135deg, #a855f7, #c084fc); }

    .tech {
      margin-top: 30px;
    }

    .tech span {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 8px 15px;
      border-radius: 20px;
      margin: 5px;
      font-size: 12px;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Docker CI/CD using GitHub Actions</h1>
    <div class="badge">docker cicd - passing</div>

    <div class="steps">
      <div class="card blue">🔄 Code Checkout</div>
      <div class="card green">⚙️ Build</div>
      <div class="card orange">📤 Push</div>
      <div class="card purple">🚀 Pull & Run</div>
    </div>

    <div class="tech">
      <span>Docker</span>
      <span>Nginx</span>
      <span>GitHub Actions</span>
      <span>Docker Hub</span>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker CI/CD Pipeline Demo</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #1f1c2c, #0f0c29);
    color: white;
}

/* Glass container */
.container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px;
    width: 90%;
    max-width: 900px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* Title */
h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #00d2ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Badge */
.badge {
    display: inline-block;
    padding: 6px 15px;
    border-radius: 999px;
    border: 1px solid #7b2ff7;
    margin: 10px 0 30px;
    color: #c4b5fd;
    font-size: 0.8rem;
}

/* Pipeline cards */
.pipeline {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    flex-wrap: wrap;
}

.step {
    flex: 1;
    min-width: 150px;
    padding: 20px;
    border-radius: 12px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
}

/* Colors like screenshot */
.step:nth-child(1) { background: #3498db; }
.step:nth-child(2) { background: #2ecc71; }
.step:nth-child(3) { background: #e67e22; }
.step:nth-child(4) { background: #9b59b6; }

/* Hover effect */
.step:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* Tech tags */
.tags {
    margin-top: 30px;
}

.tag {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    padding: 6px 12px;
    border-radius: 999px;
    margin: 5px;
    font-size: 0.8rem;
    color: #ddd;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Docker CI/CD using GitHub Actions</h1>
    <div class="badge">docker cicd • passing ✅</div>

    <div class="pipeline">
        <div class="step">🔄 Code Checkout</div>
        <div class="step">⚙️ Build</div>
        <div class="step">📦 Push</div>
        <div class="step">🚀 Pull & Run</div>
    </div>

    <div class="tags">
        <span class="tag">Docker</span>
        <span class="tag">Flask</span>
        <span class="tag">GitHub Actions</span>
        <span class="tag">Docker Hub</span>
        <!-- my name is om -->
    </div>
</div>

</body>
</html>
